<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Circular Badge Style -->
  <circle cx="50" cy="50" r="45" fill="#1a3a32"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#8fbc8f" stroke-width="1"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Text arc would go here - simplified -->
  <text x="50" y="30" text-anchor="middle" font-family="Arial" font-size="7" fill="#8fbc8f" letter-spacing="3">NOMAD</text>
  <!-- Central compass -->
  <polygon points="50,35 54,48 50,52 46,48" fill="#fff"/>
  <polygon points="50,65 54,52 50,48 46,52" fill="#8fbc8f"/>
  <circle cx="50" cy="50" r="3" fill="#fff"/>
  <!-- Bottom text -->
  <text x="50" y="78" text-anchor="middle" font-family="Arial" font-size="7" fill="#8fbc8f" letter-spacing="3">COMPASS</text>
</svg>