<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Abstract Direction Arrows -->
  <g fill="none" stroke="#1a3a32" stroke-width="4" stroke-linecap="round">
    <line x1="50" y1="10" x2="50" y2="40"/>
    <line x1="50" y1="60" x2="50" y2="90"/>
    <line x1="10" y1="50" x2="40" y2="50"/>
    <line x1="60" y1="50" x2="90" y2="50"/>
  </g>
  <!-- Arrow heads -->
  <polygon points="50,5 45,18 55,18" fill="#2d5a4a"/>
  <polygon points="95,50 82,45 82,55" fill="#2d5a4a"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="8" fill="#2d5a4a"/>
  <circle cx="50" cy="50" r="4" fill="#fff"/>
</svg>