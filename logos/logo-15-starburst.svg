<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Compass Star Burst -->
  <g fill="#1a3a32">
    <!-- 8-point star -->
    <polygon points="50,5 53,42 50,50 47,42"/>
    <polygon points="50,95 53,58 50,50 47,58"/>
    <polygon points="5,50 42,47 50,50 42,53"/>
    <polygon points="95,50 58,47 50,50 58,53"/>
    <!-- Diagonal points -->
    <polygon points="18,18 44,44 50,50 44,47" opacity="0.8"/>
    <polygon points="82,18 56,44 50,50 56,47" opacity="0.8"/>
    <polygon points="18,82 44,56 50,50 44,53" opacity="0.8"/>
    <polygon points="82,82 56,56 50,50 56,53" opacity="0.8"/>
  </g>
  <!-- Accent on north -->
  <polygon points="50,5 53,42 50,50 47,42" fill="#2d5a4a"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="8" fill="#2d5a4a"/>
  <circle cx="50" cy="50" r="4" fill="#fff"/>
</svg>