<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Compass with Airplane Trail -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#1a3a32" stroke-width="2"/>
  <!-- Compass markers -->
  <line x1="50" y1="14" x2="50" y2="22" stroke="#1a3a32" stroke-width="2"/>
  <line x1="50" y1="78" x2="50" y2="86" stroke="#1a3a32" stroke-width="2"/>
  <line x1="14" y1="50" x2="22" y2="50" stroke="#1a3a32" stroke-width="2"/>
  <line x1="78" y1="50" x2="86" y2="50" stroke="#1a3a32" stroke-width="2"/>
  <!-- Curved airplane trail -->
  <path d="M30 70 Q50 50 70 30" fill="none" stroke="#2d5a4a" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Airplane icon -->
  <g transform="translate(70, 30) rotate(-45)">
    <path d="M0 0 L-5 3 L-5 -3 Z M-5 0 L-12 5 L-12 -5 Z" fill="#1a3a32"/>
  </g>
  <!-- Center -->
  <circle cx="50" cy="50" r="4" fill="#1a3a32"/>
</svg>