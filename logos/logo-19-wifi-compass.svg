<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Compass with WiFi Signal (Digital Nomad theme) -->
  <circle cx="50" cy="55" r="35" fill="none" stroke="#1a3a32" stroke-width="2"/>
  <!-- Compass needle -->
  <polygon points="50,25 54,52 50,58 46,52" fill="#2d5a4a"/>
  <polygon points="50,85 54,58 50,52 46,58" fill="#1a3a32"/>
  <circle cx="50" cy="55" r="4" fill="#1a3a32"/>
  <!-- WiFi signal arcs at top -->
  <path d="M35 20 Q50 10 65 20" fill="none" stroke="#2d5a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 15 Q50 8 60 15" fill="none" stroke="#2d5a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 10 Q50 6 55 10" fill="none" stroke="#2d5a4a" stroke-width="2" stroke-linecap="round"/>
</svg>