<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Modern Geometric Compass -->
  <g fill="#1a3a32">
    <!-- Outer octagon -->
    <polygon points="50,5 79,21 95,50 79,79 50,95 21,79 5,50 21,21" fill="none" stroke="#1a3a32" stroke-width="2"/>
    <!-- Inner geometric pattern -->
    <polygon points="50,15 60,45 50,50 40,45" fill="#2d5a4a"/>
    <polygon points="50,85 60,55 50,50 40,55" fill="#1a3a32"/>
    <polygon points="15,50 45,40 50,50 45,60" fill="#1a3a32" opacity="0.7"/>
    <polygon points="85,50 55,40 50,50 55,60" fill="#1a3a32" opacity="0.7"/>
  </g>
  <circle cx="50" cy="50" r="5" fill="#8fbc8f"/>
</svg>