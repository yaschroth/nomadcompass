<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Minimalist Compass Rose -->
  <g fill="#1a3a32">
    <!-- Main points -->
    <polygon points="50,5 55,40 50,45 45,40"/>
    <polygon points="50,95 55,60 50,55 45,60"/>
    <polygon points="5,50 40,45 45,50 40,55"/>
    <polygon points="95,50 60,45 55,50 60,55"/>
    <!-- Diagonal points (smaller) -->
    <polygon points="20,20 42,42 45,45 42,48" opacity="0.6"/>
    <polygon points="80,20 58,42 55,45 58,48" opacity="0.6"/>
    <polygon points="20,80 42,58 45,55 42,52" opacity="0.6"/>
    <polygon points="80,80 58,58 55,55 58,52" opacity="0.6"/>
  </g>
  <circle cx="50" cy="50" r="5" fill="#2d5a4a"/>
</svg>