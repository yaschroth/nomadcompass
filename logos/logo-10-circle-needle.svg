<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple Circle with Bold Needle -->
  <circle cx="50" cy="50" r="42" fill="#1a3a32"/>
  <circle cx="50" cy="50" r="36" fill="#fff"/>
  <!-- Bold compass needle -->
  <polygon points="50,15 58,48 50,55 42,48" fill="#e74c3c"/>
  <polygon points="50,85 58,52 50,45 42,52" fill="#1a3a32"/>
  <!-- Center ring -->
  <circle cx="50" cy="50" r="8" fill="#1a3a32"/>
  <circle cx="50" cy="50" r="4" fill="#fff"/>
</svg>