<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- NC Monogram with compass needle -->
  <circle cx="50" cy="50" r="45" fill="#1a3a32"/>
  <text x="32" y="62" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#fff">N</text>
  <text x="55" y="62" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#8fbc8f">C</text>
  <!-- Small compass needle accent -->
  <polygon points="50,12 52,20 50,22 48,20" fill="#8fbc8f"/>
</svg>