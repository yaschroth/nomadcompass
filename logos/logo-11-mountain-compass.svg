<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Mountain with Compass -->
  <circle cx="50" cy="50" r="45" fill="#1a3a32"/>
  <!-- Mountains -->
  <polygon points="15,75 35,40 55,75" fill="#2d5a4a"/>
  <polygon points="40,75 65,30 90,75" fill="#3d6b5a"/>
  <!-- Snow caps -->
  <polygon points="65,30 60,40 70,40" fill="#fff"/>
  <polygon points="35,40 30,48 40,48" fill="#fff"/>
  <!-- Compass needle (small, top right) -->
  <g transform="translate(75, 25)">
    <circle cx="0" cy="0" r="12" fill="#fff"/>
    <polygon points="0,-8 2,0 0,2 -2,0" fill="#e74c3c"/>
    <polygon points="0,8 2,0 0,-2 -2,0" fill="#1a3a32"/>
    <circle cx="0" cy="0" r="2" fill="#1a3a32"/>
  </g>
</svg>