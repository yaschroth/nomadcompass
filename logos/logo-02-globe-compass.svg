<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Globe with Compass Needle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#1a3a32" stroke-width="2"/>
  <!-- Globe lines -->
  <ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="#1a3a32" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="16" ry="40" fill="none" stroke="#1a3a32" stroke-width="1"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1a3a32" stroke-width="1"/>
  <!-- Compass needle overlay -->
  <polygon points="50,15 55,48 50,52 45,48" fill="#e74c3c"/>
  <polygon points="50,85 55,52 50,48 45,52" fill="#1a3a32"/>
  <circle cx="50" cy="50" r="4" fill="#1a3a32"/>
</svg>