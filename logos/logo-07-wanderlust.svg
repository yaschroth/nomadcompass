<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wanderlust Compass with path -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#1a3a32" stroke-width="2"/>
  <!-- Dotted travel path -->
  <path d="M15 75 Q30 60 40 65 Q55 72 65 55 Q80 35 85 25" fill="none" stroke="#2d5a4a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Compass needle -->
  <polygon points="50,20 54,48 50,52 46,48" fill="#e74c3c"/>
  <polygon points="50,80 54,52 50,48 46,52" fill="#1a3a32"/>
  <circle cx="50" cy="50" r="4" fill="#1a3a32"/>
  <!-- Airplane at end of path -->
  <polygon points="85,25 90,20 88,28 82,26" fill="#2d5a4a"/>
</svg>