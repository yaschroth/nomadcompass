<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Classic Compass Design -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1a3a32" stroke-width="3"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#1a3a32" stroke-width="1"/>
  <!-- Compass points -->
  <polygon points="50,12 54,45 50,50 46,45" fill="#2d5a4a"/>
  <polygon points="50,88 54,55 50,50 46,55" fill="#1a3a32"/>
  <polygon points="12,50 45,46 50,50 45,54" fill="#1a3a32"/>
  <polygon points="88,50 55,46 50,50 55,54" fill="#1a3a32"/>
  <!-- Center circle -->
  <circle cx="50" cy="50" r="6" fill="#2d5a4a"/>
  <circle cx="50" cy="50" r="3" fill="#fff"/>
  <!-- N marker -->
  <text x="50" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="8" fill="#2d5a4a">N</text>
</svg>